name: Live Backends

on:
  workflow_dispatch:

jobs:
  live-backends:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and integration dependencies
        run: python -m pip install -e ".[dev,integration]"
      - name: Run live backend validation
        run: python scripts/run_live_backend_tests.py
